<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Visions of New Zealand</title>
    <link rel="stylesheet" href="imageCycle.css">
    <!--  comment out to use jQuery version -->
    

</head>
<body onload="loadSlides()">


    <main class="calculator-card">
        <h1>Visions of New Zealand</h1>
        
        <figure id="slideshow-container">
            <a id="slide_link" href="#">
                <img id="slide_image" alt="New Zealand Vision">
            </a>
            <figcaption id="slide_text"></figcaption>
        </figure>

        <div id="footnote">
            Click on image for more information...
            <button id="btnToggle" class="control-btn">Pause</button>
        </div>
    </main>
<script src="imageCycler.js" defer></script>

</body>
</html>
